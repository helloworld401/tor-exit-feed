name: Update Tor Exit List

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"   # каждые 6 часов

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run updater
        run: |
          chmod +x scripts/update_tor_exit.sh
          scripts/update_tor_exit.sh

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "tor-exit-bot"
          git config user.email "tor-exit-bot@users.noreply.github.com"
          git add tor_exit_nodes.txt
          git commit -m "chore: update tor exit list"
          git push
